name: Update M3U8 Links

on:
  workflow_dispatch:
    inputs:
      old_string: # <--- MODIFICA (rinominato da old_domain)
        description: 'Dominio (es. "vecchio.com") o link esatto (es. "https://link.errato") da sostituire.' # <--- MODIFICA (descrizione più chiara)
        required: true
        default: 'keryfia-newale.hf.space'
        type: string
      new_string: # <--- MODIFICA (rinominato da new_domain)
        description: 'Nuovo dominio o link con cui sostituire.' # <--- MODIFICA (descrizione più chiara)
        required: true
        type: string
      commit_message:
        description: 'Messaggio del commit (opzionale)'
        required: false
        default: 'Update M3U8 links'
        type: string

jobs:
  update-links:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Update M3U8 links
      run: |
        # Usa i nuovi nomi delle variabili di input
        python update_m3u8.py --old "${{ github.event.inputs.old_string }}" --new "${{ github.event.inputs.new_string }}" # <--- MODIFICA
        
    - name: Check for changes
      id: check_changes
      run: |
        if git diff --quiet; then
          echo "changes=false" >> $GITHUB_OUTPUT
        else
          echo "changes=true" >> $GITHUB_OUTPUT
        fi
        
    - name: Commit and push changes
      if: steps.check_changes.outputs.changes == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add listone.m3u8
        # Aggiorna il messaggio del commit per usare i nuovi nomi
        git commit -m "${{ github.event.inputs.commit_message }}: ${{ github.event.inputs.old_string }} → ${{ github.event.inputs.new_string }}" # <--- MODIFICA
        git push
        
    - name: No changes detected
      if: steps.check_changes.outputs.changes == 'false'
      run: |
        echo "ℹ️ Nessuna modifica da committare. Il file potrebbe essere già aggiornato."
